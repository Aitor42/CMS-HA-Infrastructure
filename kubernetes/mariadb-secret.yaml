# mariadb-secret.yaml
# Secretos para las contraseñas de MariaDB
# Valores en base64:
#   mysqlrootpass  -> bXlzcWxyb290cGFzcw==
#   WpS3cur3P4ss!  -> V3BTM2N1cjNQNHNzIQ==
apiVersion: v1
kind: Secret
metadata:
  name: mariadb-secret
  namespace: cms
  labels:
    app: mariadb
type: Opaque
data:
  MYSQL_ROOT_PASSWORD: bXlzcWxyb290cGFzcw==
  MYSQL_WP_PASSWORD: V3BTM2N1cjNQNHNzIQ==
