# upstream: Pool with both CMS frontends in the main network
upstream cms_backend {
    server 192.168.20.101 max_fails=3 fail_timeout=30s;  # CMS Frontend 1
    server 192.168.20.102 max_fails=3 fail_timeout=30s;  # CMS Frontend 2
}

# HTTP server (Port 80): Permanent redirect (301) to HTTPS
server {
    listen 80;
    server_name cms.fake-enterprise.com;

    return 301 https://$host$request_uri;
}

# HTTPS server (Port 443): Secure reverse proxy
server {
    listen 443 ssl;
    server_name cms.fake-enterprise.com;

    # SSL certificate
    ssl_certificate     /etc/nginx/ssl/cms.crt;
    ssl_certificate_key /etc/nginx/ssl/cms.key;

    # Secure transport protocols
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://cms_backend;

        # Headers required for WordPress to detect it is served over SSL
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
