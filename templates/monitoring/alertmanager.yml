# alertmanager.yml
# Alertmanager configuration for the CMS HA infrastructure.
# Defines notification routes and receivers for critical alerts.
#
# Default receiver uses a generic webhook endpoint.
# Replace the webhook_url with your own Discord/Slack/PagerDuty endpoint.

global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'webhook-notifications'
  routes:
    - match:
        severity: critical
      receiver: 'webhook-notifications'
      repeat_interval: 1h

receivers:
  - name: 'webhook-notifications'
    webhook_configs:
      - url: 'http://localhost:9095/webhook'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
